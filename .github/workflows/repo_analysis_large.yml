name: 🔍 Large Repo Analysis (Chunked)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze Large Repository
    runs-on: ubuntu-latest
    timeout-minutes: 20  # Increased for multiple API calls

    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify Secret Exists
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          if [ -z "$NVIDIA_API_KEY" ]; then
            echo "❌ NVIDIA_API_KEY is EMPTY or NOT SET"
            exit 1
          else
            echo "✅ NVIDIA_API_KEY is set (length: ${#NVIDIA_API_KEY})"
          fi

      - name: Install Dependencies
        run: pip install openai

      - name: Run Chunked Repo Analysis
        id: analysis
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          python .github/scripts/analyze_repo_large.py ${{ github.workspace }}

      - name: Upload Analysis Report
        uses: actions/upload-artifact@v4
        with:
          name: large-repo-analysis-report
          path: repo_analysis.md
          retention-days: 30

      - name: Post Analysis as PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const analysis = fs.readFileSync('repo_analysis.md', 'utf8');
            
            const maxLength = 65000;
            const body = analysis.length > maxLength
              ? analysis.substring(0, maxLength) + "\n\n⚠️ *Report truncated. Download full artifact.*"
              : analysis;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 GLM-5.2 Large Repo Analysis\n\n${body}`
            });

      - name: Create Issue with Analysis
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const analysis = fs.readFileSync('repo_analysis.md', 'utf8');
            
            const maxLength = 65000;
            const body = analysis.length > maxLength
              ? analysis.substring(0, maxLength) + "\n\n⚠️ *Report truncated. Download artifact for full report.*"
              : analysis;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔍 Large Repo Analysis - ${new Date().toISOString().split('T')[0]}`,
              body: `## 🤖 GLM-5.2 Full Repository Analysis\n\n${body}`,
              labels: ['analysis', 'automated']
            });